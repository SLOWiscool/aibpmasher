<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro DJ Mashup Engine</title>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: sans-serif; text-align: center; }
        .mixer { display: flex; justify-content: center; gap: 20px; padding: 40px; }
        .deck { background: #15151e; padding: 25px; border-radius: 15px; width: 340px; border: 2px solid #222; }
        button { background: #2d6cff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin: 5px 0; }
        .mash-btn { background: #ff3c6f; height: 60px; font-size: 1.2em; width: 400px; margin-top: 20px; }
        .status { color: #00ff88; font-family: monospace; margin: 10px 0; }
    </style>
</head>
<body>

<h1>🎛️ PRO MASHUP ENGINE</h1>
<div class="mixer">
    <div class="deck">
        <h3>DECK A</h3>
        <input type="file" id="file-A" accept="audio/*">
        <div class="status" id="stat-A">STANDBY</div>
        <button onclick="startDeck('A')">PLAY A</button>
    </div>
    <div class="deck">
        <h3>DECK B</h3>
        <input type="file" id="file-B" accept="audio/*">
        <div class="status" id="stat-B">STANDBY</div>
        <button onclick="startDeck('B')">PLAY B</button>
    </div>
</div>

<button class="mash-btn" onclick="triggerBeatMatchMashup()">🚀 SYNC & MASHUP TRANSITION</button>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let decks = {
    A: { buffer: null, source: null, gain: null, bpm: 124, startTime: 0 },
    B: { buffer: null, source: null, gain: null, bpm: 128, startTime: 0 }
};

// Load Logic
document.getElementById('file-A').onchange = (e) => load(e, 'A');
document.getElementById('file-B').onchange = (e) => load(e, 'B');

async function load(e, d) {
    const arrayBuffer = await e.target.files[0].arrayBuffer();
    decks[d].buffer = await audioCtx.decodeAudioData(arrayBuffer);
    document.getElementById(`stat-${d}`).innerText = "READY";
}

function setupPlayer(d) {
    if (decks[d].source) try { decks[d].source.stop(); } catch(e) {}
    decks[d].source = audioCtx.createBufferSource();
    decks[d].source.buffer = decks[d].buffer;
    decks[d].gain = audioCtx.createGain();
    decks[d].source.connect(decks[d].gain);
    decks[d].gain.connect(audioCtx.destination);
    return decks[d];
}

function startDeck(d) {
    if (!decks[d].buffer) return alert("Load a file!");
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const player = setupPlayer(d);
    player.source.start(0);
    player.startTime = audioCtx.currentTime;
    document.getElementById(`stat-${d}`).innerText = "PLAYING";
}

// ---------------- THE DJ "MASHUP" LOGIC ----------------
function triggerBeatMatchMashup() {
    const now = audioCtx.currentTime;
    const duration = 10; // Crossfade length in seconds
    const A = decks.A;
    const B = decks.B;

    if (!A.source || !B.buffer) return alert("Start Deck A first, then load Deck B!");

    // 1. BEAT SYNC: Find the next perfect beat in Song A
    const beatDurationA = 60 / A.bpm;
    const timeInTrackA = now - A.startTime;
    const nextBeatDelay = beatDurationA - (timeInTrackA % beatDurationA);
    const syncStartTime = now + nextBeatDelay;

    // 2. PREPARE DECK B
    const playerB = setupPlayer('B');
    B.startTime = syncStartTime;

    // 3. MATCH SPEEDS: Set Deck B's initial speed to match Deck A's current tempo
    playerB.source.playbackRate.setValueAtTime(A.bpm / B.bpm, syncStartTime);
    playerB.gain.gain.setValueAtTime(0, syncStartTime);

    // 4. THE MORPH: Gradually shift both to Deck B's natural tempo during the fade
    A.source.playbackRate.linearRampToValueAtTime(B.bpm / A.bpm, syncStartTime + duration);
    playerB.source.playbackRate.linearRampToValueAtTime(1.0, syncStartTime + duration);

    // 5. EQUAL POWER CROSSFADE (Pro Curve)
    A.gain.gain.setValueAtTime(1, syncStartTime);
    A.gain.gain.linearRampToValueAtTime(0, syncStartTime + duration);
    playerB.gain.gain.linearRampToValueAtTime(1, syncStartTime + duration);

    playerB.source.start(syncStartTime);
    document.getElementById('stat-B').innerText = "MASHING UP...";
}
</script>
</body>
</html>
