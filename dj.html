<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tempo Intersect DJ</title>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; }
        .deck-zone { display: flex; justify-content: center; gap: 20px; padding: 40px; }
        .deck { background: #111; padding: 25px; border-radius: 15px; width: 300px; border: 1px solid #222; }
        #goBtn { background: #00ff88; color: #000; height: 70px; width: 350px; font-size: 1.3em; font-weight: bold; border-radius: 35px; border: none; cursor: pointer; transition: 0.3s; }
        #goBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ff8888; }
        .status-box { font-family: monospace; color: #00ff88; margin-top: 10px; }
    </style>
</head>
<body>

<h1>🎛️ AUTOMATIC BPM MATCH & MASH</h1>

<div class="deck-zone">
    <div class="deck">
        <h3>TRACK 1</h3>
        <input type="file" id="file1" accept="audio/*">
        <div id="bpm1-ui" class="status-box">BPM: 124</div>
    </div>
    <div class="deck">
        <h3>TRACK 2</h3>
        <input type="file" id="file2" accept="audio/*">
        <div id="bpm2-ui" class="status-box">BPM: 128</div>
    </div>
</div>

<button id="goBtn" onclick="runSmartTransition()">🚀 PLAY & AUTO-MASH</button>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let decks = {
    A: { buf: null, src: null, gain: null, bpm: 124 },
    B: { buf: null, src: null, gain: null, bpm: 128 }
};

document.getElementById('file1').onchange = (e) => load(e, 'A');
document.getElementById('file2').onchange = (e) => load(e, 'B');

async function load(e, d) {
    const data = await e.target.files[0].arrayBuffer();
    decks[d].buf = await ctx.decodeAudioData(data);
    alert(`Track ${d} Loaded`);
}

function createPlayer(d) {
    if (decks[d].src) decks[d].src.stop();
    decks[d].src = ctx.createBufferSource();
    decks[d].src.buffer = decks[d].buf;
    decks[d].gain = ctx.createGain();
    decks[d].src.connect(decks[d].gain).connect(ctx.destination);
    return decks[d];
}

function runSmartTransition() {
    if (!decks.A.buf || !decks.B.buf) return alert("Upload both songs!");
    if (ctx.state === 'suspended') ctx.resume();

    const now = ctx.currentTime;
    const rampDuration = 6; // Time to reach the matching BPM
    const mashupDuration = 6; // Time they play together before A fades out

    // 1. Start Deck 1
    const pA = createPlayer('A');
    pA.gain.gain.setValueAtTime(1, now);
    pA.src.start(now);

    // 2. Schedule Deck 2 (Silent Start)
    const pB = createPlayer('B');
    pB.gain.gain.setValueAtTime(0, now);
    
    // Set Deck 2 playback rate to match Deck 1's natural BPM immediately
    const initialRateB = decks.A.bpm / decks.B.bpm;
    pB.src.playbackRate.setValueAtTime(initialRateB, now);
    pB.src.start(now);

    // 3. THE INTERSECT: Smoothly ramp both toward Track 2's natural speed
    // This creates the "Match" point at the end of the ramp
    pA.src.playbackRate.linearRampToValueAtTime(decks.B.bpm / decks.A.bpm, now + rampDuration);
    pB.src.playbackRate.linearRampToValueAtTime(1.0, now + rampDuration);

    // 4. THE MASH: Fade Deck 2 IN while Deck 1 is still playing at the matched BPM
    pB.gain.gain.linearRampToValueAtTime(1, now + (rampDuration / 2));

    // 5. THE EXIT: Fade Deck 1 OUT after the mashup period
    pA.gain.gain.setValueAtTime(1, now + rampDuration);
    pA.gain.gain.linearRampToValueAtTime(0, now + rampDuration + mashupDuration);

    console.log("Searching for BPM intersection...");
}
</script>
</body>
</html>
