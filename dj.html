<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beat-Lock DJ Transition</title>
    <style>
        body { background: #050508; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .deck-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .deck { background: #111; padding: 20px; border-radius: 15px; width: 280px; border: 2px solid #333; }
        #masterBtn { background: #ff0055; color: white; padding: 20px 50px; font-size: 1.5rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .status { color: #00ff88; margin-top: 10px; font-family: monospace; height: 20px; }
    </style>
</head>
<body>

    <h1>🎧 BEAT-LOCK TRANSITION</h1>
    <div class="deck-container">
        <div class="deck">
            <h3>SONG 1</h3>
            <input type="file" id="file1" accept="audio/*">
            <div id="stat1" class="status"></div>
        </div>
        <div class="deck">
            <h3>SONG 2</h3>
            <input type="file" id="file2" accept="audio/*">
            <div id="stat2" class="status"></div>
        </div>
    </div>

    <button id="masterBtn" onclick="initiateDJSwap()">START TRANSITION</button>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let song1 = { buf: null, src: null, gain: null, bpm: 140 }; // Target BPM 1
let song2 = { buf: null, src: null, gain: null, bpm: 145 }; // Target BPM 2

document.getElementById('file1').onchange = (e) => load(e, song1, 'stat1');
document.getElementById('file2').onchange = (e) => load(e, song2, 'stat2');

async function load(e, song, statId) {
    const data = await e.target.files[0].arrayBuffer();
    song.buf = await audioCtx.decodeAudioData(data);
    document.getElementById(statId).innerText = "LOADED";
}

function initiateDJSwap() {
    if (!song1.buf || !song2.buf) return alert("Load both tracks!");
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const now = audioCtx.currentTime;
    const transitionDuration = 8; // Seconds for the "hand-in-hand" mashup
    const meetingBPM = (song1.bpm + song2.bpm) / 2; // The "Hand-in-hand" point

    // 1. Setup Song 1 (Playing now)
    song1.src = audioCtx.createBufferSource();
    song1.src.buffer = song1.buf;
    song1.gain = audioCtx.createGain();
    song1.src.connect(song1.gain).connect(audioCtx.destination);
    
    // 2. Setup Song 2 (Waiting to drop)
    song2.src = audioCtx.createBufferSource();
    song2.src.buffer = song2.buf;
    song2.gain = audioCtx.createGain();
    song2.src.connect(song2.gain).connect(audioCtx.destination);

    // 3. Start Song 1 immediately
    song1.src.start(now);

    // 4. THE HAND-IN-HAND PROCESS
    // We wait 2 seconds, then start the "mashup"
    const mashStart = now + 2;
    
    // Ramp Song 1 UP to the meeting BPM (e.g. 140 -> 142.5)
    song1.src.playbackRate.linearRampToValueAtTime(meetingBPM / song1.bpm, mashStart + transitionDuration);
    
    // Drop Song 2 SILENTLY but synced to the meeting BPM
    song2.src.playbackRate.setValueAtTime(meetingBPM / song2.bpm, mashStart);
    song2.gain.gain.setValueAtTime(0, mashStart);
    
    // 5. THE CROSSFADE (The Swap)
    // As Song 1 reaches the meeting point, it fades out
    song1.gain.gain.setValueAtTime(1, mashStart);
    song1.gain.gain.linearRampToValueAtTime(0, mashStart + transitionDuration);

    // As Song 2 reaches the meeting point, it fades in
    song2.gain.gain.linearRampToValueAtTime(1, mashStart + transitionDuration);

    song2.src.start(mashStart);

    // 6. FINAL STEP: Bring Song 2 to its natural 145 BPM after the swap
    song2.src.playbackRate.linearRampToValueAtTime(1.0, mashStart + transitionDuration + 2);
}
</script>
</body>
</html>
