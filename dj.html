<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro BPM Morph DJ</title>
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .mixer { display: flex; justify-content: center; gap: 30px; padding: 40px; }
        .deck { background: #1a1a24; padding: 25px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        .controls { margin-top: 20px; }
        button { background: #3a86ff; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:hover { background: #2a6fdf; }
        input[type="file"] { font-size: 12px; margin-bottom: 15px; }
        .crossfader-zone { margin: 20px auto; width: 400px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #morphBtn { background: #ff0054; width: 250px; font-size: 1.1em; padding: 15px; margin-top: 20px; }
        .status { color: #00f5d4; font-weight: bold; margin: 10px; font-family: monospace; }
    </style>
</head>
<body>

<h1>🎧 PRO BPM MORPH ENGINE</h1>
<p>Upload two tracks, play Deck A, then hit Morph to blend into Deck B.</p>

<div class="mixer">
    <!-- DECK A -->
    <div class="deck" id="ui-A">
        <h3>DECK A</h3>
        <input type="file" id="file-A" accept="audio/*">
        <div class="status" id="bpm-A">BPM: --</div>
        <button onclick="manualPlay('A')">PLAY DECK A</button>
    </div>

    <!-- DECK B -->
    <div class="deck" id="ui-B">
        <h3>DECK B</h3>
        <input type="file" id="file-B" accept="audio/*">
        <div class="status" id="bpm-B">BPM: --</div>
        <button onclick="manualPlay('B')">PLAY DECK B</button>
    </div>
</div>

<div class="crossfader-zone">
    <label>Manual Crossfade</label>
    <input type="range" id="xfade" min="0" max="1" step="0.01" value="0.5" oninput="updateManualXFade(this.value)">
    <button id="morphBtn" onclick="triggerBpmMorph()">🎛️ TRIGGER AUTO-MORPH</button>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let decks = {
    A: { buffer: null, source: null, gainNode: null, bpm: 125, startTime: 0 },
    B: { buffer: null, source: null, gainNode: null, bpm: 128, startTime: 0 }
};

// 1. Loading Logic
document.getElementById('file-A').onchange = (e) => loadTrack(e, 'A');
document.getElementById('file-B').onchange = (e) => loadTrack(e, 'B');

async function loadTrack(e, deckID) {
    const file = e.target.files[0];
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    decks[deckID].buffer = audioBuffer;
    
    // Simplistic BPM detection (In a real app, use a library like Meyda)
    // Here we'll default to 128 if unknown, or you can prompt user
    document.getElementById(`bpm-${deckID}`).innerText = `BPM: ${decks[deckID].bpm} (Ready)`;
}

// 2. Playback Engine
function createSource(deckID) {
    const deck = decks[deckID];
    if (deck.source) deck.source.stop();

    deck.source = audioCtx.createBufferSource();
    deck.source.buffer = deck.buffer;
    
    deck.gainNode = audioCtx.createGain();
    deck.source.connect(deck.gainNode);
    deck.gainNode.connect(audioCtx.destination);
    
    return { source: deck.source, gain: deck.gainNode };
}

function manualPlay(deckID) {
    if (!decks[deckID].buffer) return alert("Load a file first!");
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const { source } = createSource(deckID);
    source.start(0);
    decks[deckID].startTime = audioCtx.currentTime;
}

// 3. THE BPM MORPH LOGIC
function triggerBpmMorph() {
    const now = audioCtx.currentTime;
    const duration = 8; // Transition takes 8 seconds
    const A = decks.A;
    const B = decks.B;

    if (!A.source || !B.buffer) return alert("Deck A must be playing and Deck B must be loaded!");

    // Calculate Sync: Find the next 'beat' of Deck A to start Deck B
    const beatDurationA = 60 / A.bpm;
    const timeInTrackA = now - A.startTime;
    const nextBeatA = Math.ceil(timeInTrackA / beatDurationA) * beatDurationA;
    const startSyncTime = A.startTime + nextBeatA;

    // Prepare Deck B
    const { source: srcB, gain: gainB } = createSource('B');
    B.startTime = startSyncTime;

    // Initial States
    gainB.gain.setValueAtTime(0, startSyncTime);
    srcB.playbackRate.setValueAtTime(A.bpm / B.bpm, startSyncTime); // Match Deck A's speed

    // MORPH: Ramp both to a shared target (we'll use Deck B's natural BPM)
    const targetRateA = B.bpm / A.bpm;
    const targetRateB = 1.0;

    // Execute Tempo Ramp
    A.source.playbackRate.linearRampToValueAtTime(targetRateA, startSyncTime + duration);
    srcB.playbackRate.linearRampToValueAtTime(targetRateB, startSyncTime + duration);

    // Execute Volume Crossfade (Equal Power Curve approximation)
    A.gainNode.gain.linearRampToValueAtTime(0, startSyncTime + duration);
    gainB.gain.linearRampToValueAtTime(1, startSyncTime + duration);

    srcB.start(startSyncTime);
    console.log("Morphing initiated...");
}

function updateManualXFade(val) {
    if (decks.A.gainNode) decks.A.gainNode.gain.value = 1 - val;
    if (decks.B.gainNode) decks.B.gainNode.gain.value = val;
}
</script>
</body>
</html>
