<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BPM Morph DJ Engine</title>
<style>
body {
  margin: 0;
  background: #0b0b10;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 { margin: 20px; }

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.deck {
  background: #161621;
  padding: 15px;
  border-radius: 12px;
  width: 300px;
}

button, input {
  width: 100%;
  margin-top: 10px;
}

button {
  padding: 10px;
  background: #2d6cff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

button:hover { background: #1e4fc2; }

canvas {
  width: 100%;
  height: 60px;
  background: #0f0f18;
  margin-top: 10px;
}

.led {
  width: 15px;
  height: 15px;
  background: #333;
  border-radius: 50%;
  margin: 10px auto;
}

.led.active {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
}

#transitionBtn {
  margin-top: 20px;
  width: 250px;
  background: #ff3c6f;
}
</style>
</head>
<body>

<h1>🎧 BPM Morph DJ Engine</h1>

<div class="container">

  <div class="deck">
    <h3>Deck A</h3>
    <input type="file" id="fileA" />
    <button onclick="play('A')">Play</button>
    <button onclick="stop('A')">Stop</button>
    <canvas id="waveA"></canvas>
    <div class="led" id="ledA"></div>
  </div>

  <div class="deck">
    <h3>Deck B</h3>
    <input type="file" id="fileB" />
    <button onclick="play('B')">Play</button>
    <button onclick="stop('B')">Stop</button>
    <canvas id="waveB"></canvas>
    <div class="led" id="ledB"></div>
  </div>

</div>

<button id="transitionBtn" onclick="startBPMMorph()">🎛️ START BPM MORPH</button>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

let targetBPM = 128;

let decks = {
  A: { buffer: null, source: null, bpm: 120, gain: null, rate: 1 },
  B: { buffer: null, source: null, bpm: 120, gain: null, rate: 1 }
};

let transition = {
  duration: 15,
  active: false
};

// ---------------- FILE LOAD ----------------
document.getElementById("fileA").onchange = e => load(e, "A");
document.getElementById("fileB").onchange = e => load(e, "B");

async function load(e, deck) {
  const file = e.target.files[0];
  const buf = await file.arrayBuffer();
  const audio = await ctx.decodeAudioData(buf);

  decks[deck].buffer = audio;
  decks[deck].bpm = estimateBPM(audio);

  drawWave(deck, audio);

  alert(`Deck ${deck} BPM ≈ ${decks[deck].bpm.toFixed(1)}`);
}

// ---------------- BPM ESTIMATION ----------------
function estimateBPM(buffer) {
  const data = buffer.getChannelData(0);
  const sr = buffer.sampleRate;

  let peaks = [];
  let last = 0;

  for (let i = 0; i < data.length; i++) {
    if (data[i] > 0.35 && i - last > sr * 0.25) {
      peaks.push(i);
      last = i;
    }
  }

  let intervals = [];
  for (let i = 1; i < peaks.length; i++) {
    intervals.push((peaks[i] - peaks[i - 1]) / sr);
  }

  let avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
  return 60 / avg || 120;
}

// ---------------- PLAY ----------------
function play(d) {
  stop(d);

  const deck = decks[d];
  if (!deck.buffer) return;

  const src = ctx.createBufferSource();
  const gain = ctx.createGain();

  deck.gain = gain;

  src.buffer = deck.buffer;
  src.playbackRate.value = deck.rate;

  src.connect(gain);
  gain.connect(ctx.destination);

  src.start();

  deck.source = src;

  beatLED(d, deck.bpm);
}

// ---------------- STOP ----------------
function stop(d) {
  if (decks[d].source) {
    try { decks[d].source.stop(); } catch {}
    decks[d].source = null;
  }
}

// ---------------- SYNC UTIL ----------------
function nextDownbeat(time, bpm) {
  const beat = 60 / bpm;
  return Math.ceil(time / beat) * beat;
}

// ---------------- BPM MORPH ENGINE ----------------
function startBPMMorph() {
  const now = ctx.currentTime;

  const A = decks.A;
  const B = decks.B;

  if (!A.buffer || !B.buffer) return;

  stop("A");
  stop("B");

  const startTime = nextDownbeat(now, A.bpm);

  const srcA = ctx.createBufferSource();
  const srcB = ctx.createBufferSource();

  const gainA = ctx.createGain();
  const gainB = ctx.createGain();

  srcA.buffer = A.buffer;
  srcB.buffer = B.buffer;

  srcA.connect(gainA);
  srcB.connect(gainB);

  gainA.connect(ctx.destination);
  gainB.connect(ctx.destination);

  const duration = transition.duration;

  const aTarget = targetBPM / A.bpm;
  const bTarget = targetBPM / B.bpm;

  // initial
  srcA.playbackRate.setValueAtTime(1, startTime);
  srcB.playbackRate.setValueAtTime(1, startTime);

  gainA.gain.setValueAtTime(1, startTime);
  gainB.gain.setValueAtTime(0, startTime);

  // BPM morph
  srcA.playbackRate.linearRampToValueAtTime(aTarget, startTime + duration);
  srcB.playbackRate.linearRampToValueAtTime(bTarget, startTime + duration);

  // crossfade
  gainA.gain.linearRampToValueAtTime(0, startTime + duration);
  gainB.gain.linearRampToValueAtTime(1, startTime + duration);

  srcA.start(startTime);
  srcB.start(startTime);

  A.source = srcA;
  B.source = srcB;
}

// ---------------- LED BEAT ----------------
function beatLED(d, bpm) {
  const led = document.getElementById("led" + d);
  const interval = 60000 / bpm;

  setInterval(() => {
    led.classList.add("active");
    setTimeout(() => led.classList.remove("active"), 80);
  }, interval);
}

// ---------------- WAVEFORM ----------------
function drawWave(d, buffer) {
  const canvas = document.getElementById("wave" + d);
  const c = canvas.getContext("2d");

  const data = buffer.getChannelData(0);

  c.beginPath();

  let step = Math.floor(data.length / canvas.width);

  for (let i = 0; i < canvas.width; i++) {
    let v = data[i * step] * 50;
    c.lineTo(i, canvas.height / 2 + v);
  }

  c.strokeStyle = "#00ff88";
  c.stroke();
}
</script>

</body>
</html>
